name: Release

# On a `vX.Y.Z` tag: publish to crates.io, create a GitHub Release from
# CHANGELOG.md, and attach pre-built binaries for each platform. Requires the
# repository secret CARGO_REGISTRY_TOKEN (a crates.io API token). See
# .claude/skills/zonu-lazyk-release-prep/SKILL.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release and upload binary assets

jobs:
  # Gate: every shipped target must COMPILE before the irreversible crates.io
  # publish. Builds release on native runners, exactly as the binaries do — a
  # target that can't build aborts the release before the publish.
  build-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Compile (release, as it ships)
        run: cargo build --release

  publish-crate:
    needs: build-check # publish only if every target compiled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract this version's section from CHANGELOG.md as the release body.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { p = 1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > release-body.md
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-body.md

  binaries:
    needs: publish-crate # upload to the Release created above
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: zonu-lazyk
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          token: ${{ secrets.GITHUB_TOKEN }}
